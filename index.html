<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkyFetch - Weather Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌤️ SkyFetch</h1>
    <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    <p class="tagline">Your Personal Weather Dashboard</p>

    <!-- Search Section -->
    <div class="search-section">
        <input type="text" id="city-input" placeholder="Enter city name..." />
        <button id="search-btn">🔍 Search</button>
    </div>

    <!-- Current Weather -->
    <div id="weather-display" class="card">
        <div class="welcome-message">
            <h2>Welcome!</h2>
            <p>Enter a city name to get started.</p>
        </div>
    </div>

    <!-- Forecast -->
    <h2>5-Day Forecast</h2>
    <div id="forecast-display" class="forecast-container"></div>

    <!-- Search History -->
    <h2>Recent Searches</h2>
    <ul id="history-list"></ul>
    <button id="clear-history" class="clear-btn">Clear History</button>

</div>

<script src="app.js"></script>
</body>
</html>
